<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>페이지를 찾을 수 없어요 — Mirror Muse</title>
<meta name="robots" content="noindex" />
<link rel="canonical" href="https://mirror-muse.web.app/" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f4ebe3;--bg-2:#fbf6f1;--ink:#2c211d;--ink-soft:#7a6a60;--rose:#c87f73;--berry:#8c3a4f;--gold:#b08a5e;--line:#ddc9bb}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Gothic A1',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
  .atm{position:fixed;inset:0;z-index:0;pointer-events:none}
  .bloom{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5}
  .a{width:46vw;height:46vw;background:#e8b9a8;top:-12vw;right:-10vw}
  .b{width:40vw;height:40vw;background:#d9c3a0;bottom:-14vw;left:-12vw}
  .inner{position:relative;z-index:2;max-width:440px}
  .code{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:5rem;color:var(--berry);line-height:1;margin-bottom:12px}
  h1{font-family:'Gowun Batang',serif;font-weight:700;font-size:1.6rem;margin-bottom:14px}
  p{font-size:14px;font-weight:300;color:var(--ink-soft);line-height:1.7;margin-bottom:36px}
  a{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:var(--bg-2);font-family:'Gothic A1',sans-serif;font-weight:700;font-size:14px;letter-spacing:.04em;padding:16px 32px;border-radius:999px;text-decoration:none;transition:.3s}
  a:hover{background:var(--berry);transform:translateY(-3px)}
  .brand{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--berry);letter-spacing:.3em;text-transform:uppercase;margin-bottom:40px}
</style>
</head>
<body>
<div class="atm"><div class="bloom a"></div><div class="bloom b"></div></div>
<div class="inner">
  <div class="brand">Mirror Muse</div>
  <div class="code">404</div>
  <h1>페이지를 찾을 수 없어요</h1>
  <p>요청하신 페이지가 존재하지 않거나 이동되었어요.<br>메인 페이지에서 K-pop 뮤즈 분석을 다시 시작해 보세요.</p>
  <a href="/">← 홈으로 돌아가기</a>
</div>
</body>
</html>
