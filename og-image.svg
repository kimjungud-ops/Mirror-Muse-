<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4ebe3"/>
      <stop offset="100%" stop-color="#ead4c4"/>
    </linearGradient>
    <radialGradient id="b1" cx="85%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#e8b9a8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f4ebe3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="15%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#d9c3a0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f4ebe3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="circle-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c87f73" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8c3a4f" stop-opacity="0.06"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#b1)"/>
  <rect width="1200" height="630" fill="url(#b2)"/>

  <!-- Left decorative line -->
  <rect x="72" y="72" width="3" height="486" fill="#b08a5e" opacity="0.35"/>

  <!-- Top category label -->
  <text x="96" y="148" font-family="Georgia, serif" font-size="22" fill="#7a6a60" letter-spacing="7" opacity="0.85">K-BEAUTY RESEMBLANCE STUDIO</text>

  <!-- Brand name -->
  <text x="93" y="278" font-family="Georgia, serif" font-size="110" font-weight="bold" fill="#2c211d" letter-spacing="3">MIRROR</text>
  <text x="93" y="390" font-family="Georgia, serif" font-size="110" font-style="italic" fill="#8c3a4f" letter-spacing="2">Muse</text>

  <!-- Divider line -->
  <line x1="93" y1="415" x2="560" y2="415" stroke="#ddc9bb" stroke-width="1"/>

  <!-- Sub description -->
  <text x="95" y="456" font-family="Arial, sans-serif" font-size="26" fill="#7a6a60" font-weight="300">AI로 찾는 나의 K-pop 닮은꼴 뮤즈</text>
  <text x="95" y="494" font-family="Arial, sans-serif" font-size="21" fill="#b08a5e" font-weight="300">무료 · 브라우저 처리 · K-뷰티 화장품 추천</text>

  <!-- URL bottom left -->
  <text x="95" y="572" font-family="Georgia, serif" font-size="19" fill="#8c3a4f" letter-spacing="2" font-style="italic">mirror-muse.web.app</text>

  <!-- Right decorative circle -->
  <circle cx="940" cy="315" r="240" fill="url(#circle-glow)"/>
  <circle cx="940" cy="315" r="190" fill="none" stroke="#ddc9bb" stroke-width="1" opacity="0.6"/>
  <circle cx="940" cy="315" r="130" fill="none" stroke="#ddc9bb" stroke-width="0.5" opacity="0.4"/>

  <!-- Face landmark dots -->
  <circle cx="905" cy="235" r="4" fill="#8c3a4f" opacity="0.5"/>
  <circle cx="975" cy="235" r="4" fill="#8c3a4f" opacity="0.5"/>
  <circle cx="870" cy="278" r="3" fill="#c87f73" opacity="0.45"/>
  <circle cx="1010" cy="278" r="3" fill="#c87f73" opacity="0.45"/>
  <circle cx="940" cy="295" r="4.5" fill="#8c3a4f" opacity="0.6"/>
  <circle cx="910" cy="355" r="3" fill="#c87f73" opacity="0.45"/>
  <circle cx="970" cy="355" r="3" fill="#c87f73" opacity="0.45"/>
  <circle cx="940" cy="390" r="4" fill="#8c3a4f" opacity="0.5"/>
  <circle cx="860" cy="312" r="2.5" fill="#b08a5e" opacity="0.4"/>
  <circle cx="1020" cy="312" r="2.5" fill="#b08a5e" opacity="0.4"/>

  <!-- Percentage badge -->
  <rect x="852" y="422" width="176" height="72" rx="36" fill="#8c3a4f" opacity="0.12"/>
  <text x="940" y="468" font-family="Georgia, serif" font-size="52" fill="#8c3a4f" text-anchor="middle" font-style="italic">91%</text>

  <!-- Resemblance label -->
  <text x="940" y="530" font-family="Arial, sans-serif" font-size="16" fill="#7a6a60" text-anchor="middle" letter-spacing="4">RESEMBLANCE</text>
</svg>
